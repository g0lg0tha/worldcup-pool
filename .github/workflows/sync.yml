name: Live Match Data Sync Engine
on:
  schedule:
    - cron: '*/30 * * * *' # Automatically runs every 30 minutes
  workflow_dispatch: # Allows you to manually trigger it with a single click

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Network Components
        run: pip install requests

      - name: Execute Extractor Matrix
        run: python update_scores.py

      - name: Commit and Push Updated Pre-Calculated Data
        run: |
          git config --global user.name "GitHub Data Engine"
          git config --global user.email "actions@github.com"
          git add scores.json
          git commit -m "Automated Sync: Database scores.json updated" || exit 0
          git push
