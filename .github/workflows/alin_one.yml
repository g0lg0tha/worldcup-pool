name: Update Match Data

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run data sync
        run: python update_data.py

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add matches.json halftime.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update match data" && git push)
