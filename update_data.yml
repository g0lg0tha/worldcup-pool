name: Update Match Data
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows you to run it manually with a button
jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to save changes to the repo
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run sync script
        run: python your_script_name.py # Change this to your script's filename
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add matches.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update match data" && git push)
