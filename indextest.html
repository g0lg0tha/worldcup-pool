<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>World Cup 2026 Pool</title>
    <style>
        body { background: #1a0c05; color: #fff; font-family: sans-serif; padding: 20px; }
        .luxury-panel { background: #361f11; border: 2px solid #54311c; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .match-cols { display: grid; grid-template-columns: 1.5fr 1fr 50px 50px 60px 60px; align-items: center; padding: 10px; background: #170b04; margin-bottom: 5px; }
        #matchLogPanel { display: none; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="luxury-panel">
    <h1>World Cup 2026 Pool</h1>
    <button onclick="refreshData()">Force Refresh</button>
    <button onclick="toggleMatchLog()">Toggle Match Log</button>
    <p id="status">Ready - Click Refresh</p>
</div>

<div class="luxury-panel" id="matchLogPanel">
    <h2>Match Log</h2>
    <div id="matchLog"></div>
</div>

<script>
async function refreshData() {
    const status = document.getElementById('status');
    status.innerText = 'Syncing...';
    
    try {
        // Change the URL here if your files are in a different folder
        const response = await fetch('matches.json?cb=' + Date.now());
        
        if (!response.ok) {
            throw new Error(`HTTP Error: ${response.status} - ${response.statusText}`);
        }
        
        const games = await response.json();
        status.innerText = 'Data Loaded Successfully!';
        renderLog(games);
    } catch(e) {
        status.innerText = 'Error: ' + e.message;
        console.error("DEBUG:", e);
    }
}

function toggleMatchLog() {
    const p = document.getElementById('matchLogPanel');
    p.style.display = (p.style.display === 'block') ? 'none' : 'block';
}

function renderLog(games) {
    document.getElementById('matchLog').innerHTML = games.map(g => `
        <div class="match-cols">
            <div>${g.home || 'Home'} v ${g.away || 'Away'}</div>
            <div style="font-size:0.7rem;">Owner Data</div>
            <div>-</div>
            <div>${g.score1 || 0}-${g.score2 || 0}</div>
            <div>8</div>
            <div>0</div>
        </div>
    `).join('');
}
</script>
</body>
</html>
