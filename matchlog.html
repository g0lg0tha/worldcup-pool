<script>
const PLAYERS = { Gordon:['Brazil','Japan','Scotland'], David:['France','Norway','Bosnia & Herzegovina'], Stephen:['Germany','Paraguay','Czechia'], Bren:['Spain','Türkiye','Saudi Arabia'], Patrick:['England','Switzerland','Ghana'], Mick:['Netherlands','Austria','Haiti'] };

function normalizeName(str) { return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim() : ""; }

function owner(team) { 
    for(const [p,t] of Object.entries(PLAYERS)) if(t.includes(team)) return p; 
    return '—'; 
}

async function fetchLog() {
    try {
        // Fetch both files at once
        const [mRes, hRes] = await Promise.all([
            fetch('matches.json?cb=' + Date.now()), 
            fetch('halftime.json?cb=' + Date.now())
        ]);
        
        const games = await mRes.json();
        const htScores = await hRes.json();
        
        // Create a lookup map for halftime scores: "home-away" -> "ht_home-ht_away"
        const htMap = {};
        htScores.forEach(h => {
            htMap[`${normalizeName(h.home)}-${normalizeName(h.away)}`] = `${h.ht_home}-${h.ht_away}`;
        });

        document.getElementById('matchLog').innerHTML = games.map(g => {
            const homeName = g.home || g.team1;
            const awayName = g.away || g.team2;
            const htKey = `${normalizeName(homeName)}-${normalizeName(awayName)}`;
            const htScore = htMap[htKey] || '-';
            
            return `
                <div class="match-cols">
                    <div class="match-team">${homeName} v ${awayName}</div>
                    <div class="owner-name">${owner(homeName)} / ${owner(awayName)}</div>
                    <div class="score-cell-digits">${htScore}</div>
                    <div class="score-cell-digits">${g.score1 || 0}-${g.score2 || 0}</div>
                    <div class="score-cell-digits">8</div>
                    <div class="score-cell-digits">0</div>
                </div>
            `;
        }).join('');
    } catch(e) { 
        document.getElementById('matchLog').innerHTML = "Error loading match data."; 
        console.error(e);
    }
}
fetchLog();
</script>
