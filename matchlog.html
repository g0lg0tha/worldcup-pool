<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Match Log - World Cup 2026</title>
    <style>
        /* Shared Styles */
        :root {--metallic-chassis: linear-gradient(145deg, #a47657 0%, #613b23 25%, #361f11 50%, #7d4f32 75%, #221209 100%);--inner-wood-plate: #492817;--capsule-bg: linear-gradient(180deg, #241309 0%, #170b04 100%);--gold-trim: #ffd9a3;}
        body {font-family: 'Oswald', sans-serif; background: #0a0401; color: #fff; padding: 20px; display: flex; justify-content: center;}
        .container {width: 100%; max-width: 1000px;}
        .luxury-panel {background: var(--metallic-chassis); border-radius: 12px; padding: 15px;}
        .section-title {font-family: 'Cinzel', serif; text-align: center; color: var(--gold-trim); text-transform: uppercase; margin-bottom: 20px;}
        
        /* The New Layout */
        .match-cols {
            display: grid; 
            grid-template-columns: 1.5fr 1fr 1fr 0.5fr 0.5fr 0.5fr 0.5fr; 
            align-items: center; text-align: center; gap: 5px;
            background: var(--capsule-bg); padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 0.85rem;
        }
        .header-cols { font-weight: bold; color: #bca08d; font-size: 0.7rem; text-transform: uppercase; }
        .score-box { font-weight: bold; color: #fff; background: #000; padding: 2px 5px; border-radius: 4px; }
        .owner-text { font-size: 0.75rem; color: #ebd1be; }
    </style>
</head>
<body>

<div class="container">
    <div class="luxury-panel">
        <a href="index.html" style="color:#f7dfc1;">← Back</a>
        <div class="section-title">Full Match Log</div>
        
        <div class="match-cols header-cols">
            <span>Match</span><span>Scores (HT/FT)</span><span>T1 Owner</span><span>M</span><span>B</span><span>T2 Owner</span><span>M</span><span>B</span>
        </div>
        <div id="matchLog">Loading...</div>
    </div>
</div>

<script>
const PLAYERS = { Gordon:['Brazil','Japan','Scotland'], David:['France','Norway','Bosnia & Herzegovina'], Stephen:['Germany','Paraguay','Czechia'], Bren:['Spain','Türkiye','Saudi Arabia'], Patrick:['England','Switzerland','Ghana'], Mick:['Netherlands','Austria','Haiti'] };
function owner(team) { for(const [p,t] of Object.entries(PLAYERS)) if(t.includes(team)) return p; return '—'; }

async function fetchLog() {
    const [mRes, hRes] = await Promise.all([fetch('matches.json?cb=' + Date.now()), fetch('halftime.json?cb=' + Date.now())]);
    const games = await mRes.json();
    const htScores = await hRes.json();
    const htMap = {};
    htScores.forEach(h => htMap[`${h.home}-${h.away}`.toLowerCase().replace(/\s/g, '')] = `${h.ht_home}-${h.ht_away}`);

    document.getElementById('matchLog').innerHTML = games.map(g => {
        const hName = g.home || g.team1; const aName = g.away || g.team2;
        const key = `${hName}-${aName}`.toLowerCase().replace(/\s/g, '');
        return `
            <div class="match-cols">
                <div style="text-align:left;">${hName} vs ${aName}</div>
                <div><span class="score-box">${htMap[key] || '-'}</span> / <span class="score-box">${g.score1}-${g.score2}</span></div>
                <div class="owner-text">${owner(hName)}</div>
                <div>8</div><div>0</div>
                <div class="owner-text">${owner(aName)}</div>
                <div>8</div><div>0</div>
            </div>`;
    }).join('');
}
fetchLog();
</script>
</body>
</html>
