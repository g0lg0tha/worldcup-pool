<script>
const PLAYERS = { Gordon:['Brazil','Japan','Scotland'], David:['France','Norway','Bosnia & Herzegovina'], Stephen:['Germany','Paraguay','Czechia'], Bren:['Spain','Türkiye','Saudi Arabia'], Patrick:['England','Switzerland','Ghana'], Mick:['Netherlands','Austria','Haiti'] };
const SEEDS = {'France':1,'Spain':2,'Argentina':3,'England':4,'Portugal':5,'Brazil':6,'Netherlands':7,'Morocco':8,'Belgium':9,'Germany':10,'Croatia':11,'Colombia':12,'Senegal':13,'Mexico':14,'USA':15,'Uruguay':16,'Japan':17,'Switzerland':18,'Iran':19,'Türkiye':20,'Ecuador':21,'Austria':22,'South Korea':23,'Australia':24,'Algeria':25,'Egypt':26,'Canada':27,'Norway':28,'Panama':29,'Ivory Coast':30,'Sweden':31,'Paraguay':32,'Czechia':33,'Scotland':34,'Tunisia':35,'DR Congo':36,'Uzbekistan':37,'Qatar':38,'Iraq':39,'South Africa':40,'Saudi Arabia':41,'Jordan':42,'Bosnia & Herzegovina':43,'Cape Verde':44,'Ghana':45,'Curaçao':46,'Haiti':47,'New Zealand':48};

function owner(team) { for(const [p,t] of Object.entries(PLAYERS)) if(t.includes(team)) return p; return '—'; }

// Matches Index.html logic exactly
function normalizeName(str) { return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim() : ""; }

function findInternalTeamKey(apiName) { 
    let normApi = normalizeName(apiName); 
    if (normApi === "united states" || normApi.includes("united states") || normApi === "usa") return "USA"; 
    // This handles the Bosnia naming mismatch
    for (const teamKey in SEEDS) { if (normalizeName(teamKey) === normApi) return teamKey; }
    for (const teamKey in SEEDS) { if (normApi.includes(normalizeName(teamKey))) return teamKey; }
    return null; 
}

async function fetchLog() {
    try {
        const [mRes, hRes] = await Promise.all([fetch('matches.json?cb=' + Date.now()), fetch('halftime.json?cb=' + Date.now())]);
        const games = await mRes.json();
        const htScores = await hRes.json();
        const htMap = {};
        htScores.forEach(h => htMap[`${normalizeName(h.home)}-${normalizeName(h.away)}`] = {ht_home: h.ht_home, ht_away: h.ht_away});

        document.getElementById('matchLog').innerHTML = games.map(g => {
            const hKey = findInternalTeamKey(g.home || g.team1);
            const aKey = findInternalTeamKey(g.away || g.team2);
            
            if(!hKey || !aKey) return ''; // Skip invalid

            const hSeed = SEEDS[hKey], aSeed = SEEDS[aKey];
            const hs = parseInt(g.score1), as = parseInt(g.score2);
            const hMatch = (hs > as) ? 8 : (hs === as ? 4 : 0);
            const aMatch = (as > hs) ? 8 : (hs === as ? 4 : 0);
            
            let hBonus = 0, aBonus = 0;
            const diff = Math.abs(hSeed - aSeed);
            
            if (diff >= 5) {
                const ht = htMap[`${normalizeName(g.home || g.team1)}-${normalizeName(g.away || g.team2)}`];
                if (ht !== undefined) {
                    const underdog = (hSeed > aSeed) ? hKey : aKey;
                    const ugHt = (underdog === hKey) ? ht.ht_home : ht.ht_away;
                    const favHt = (underdog === hKey) ? ht.ht_away : ht.ht_home;
                    const b = (ugHt > favHt) ? 4 : (ugHt === favHt ? 2 : 0);
                    if (underdog === hKey) hBonus = b; else aBonus = b;
                }
            }

            return `
                <div class="match-cols">
                    <div style="text-align:left; font-size: 0.85rem;">${hKey} vs ${aKey}</div>
                    <div class="score-box">${(htMap[`${normalizeName(g.home || g.team1)}-${normalizeName(g.away || g.team2)}`]?.ht_home ?? '-')}-${(htMap[`${normalizeName(g.home || g.team1)}-${normalizeName(g.away || g.team2)}`]?.ht_away ?? '-')} / ${g.score1}-${g.score2}</div>
                    <div class="owner-text">${owner(hKey)}</div>
                    <div class="pts-text">${hMatch}</div><div class="pts-text">${hBonus}</div>
                    <div class="owner-text">${owner(aKey)}</div>
                    <div class="pts-text">${aMatch}</div><div class="pts-text">${aBonus}</div>
                </div>`;
        }).join('');
    } catch(e) { document.getElementById('matchLog').innerHTML = "<div style='text-align:center;'>Error loading data.</div>"; }
}
fetchLog();
</script>
