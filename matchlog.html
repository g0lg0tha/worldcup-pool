<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Match Log - World Cup 2026</title>
    <style>
        :root {--capsule-bg: #170b04; --gold-trim: #ffd9a3; --header-text: #bca08d;}
        body {font-family: 'Oswald', sans-serif; background: #0a0401; color: #fff; padding: 20px;}
        .container {width: 100%; max-width: 1100px; margin: auto;}
        
        /* 8 Columns: Match, Scores, T1Owner, T1M, T1B, T2Owner, T2M, T2B */
        .match-cols {
            display: grid; 
            grid-template-columns: 2fr 1fr 1fr 0.5fr 0.5fr 1fr 0.5fr 0.5fr; 
            align-items: center; 
            text-align: center; 
            gap: 8px;
            background: var(--capsule-bg); 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 6px;
            border: 1px solid #333;
        }
        .header-row { font-weight: bold; color: var(--header-text); font-size: 0.7rem; text-transform: uppercase; background: transparent !important; }
        .score-box { font-weight: bold; color: var(--gold-trim); }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="color:#f7dfc1;">← Back</a>
    <h2 style="text-align:center;">Full Match Log</h2>
    
    <div class="match-cols header-row">
        <span>Match</span><span>HT / FT</span><span>HT Owner</span><span>MATCH</span><span>BONUS</span><span>AT Owner</span><span>MATCH</span><span>BONUS</span>
    </div>
    <div id="matchLog">Loading...</div>
</div>

<script>
const PLAYERS = { Gordon:['Brazil','Japan','Scotland'], David:['France','Norway','Bosnia & Herzegovina'], Stephen:['Germany','Paraguay','Czechia'], Bren:['Spain','Türkiye','Saudi Arabia'], Patrick:['England','Switzerland','Ghana'], Mick:['Netherlands','Austria','Haiti'] };
function owner(team) { for(const [p,t] of Object.entries(PLAYERS)) if(t.includes(team)) return p; return '—'; }

async function fetchLog() {
    const [mRes, hRes] = await Promise.all([fetch('matches.json?cb=' + Date.now()), fetch('halftime.json?cb=' + Date.now())]);
    const games = await mRes.json();
    const htScores = await hRes.json();
    const htMap = {};
    htScores.forEach(h => htMap[`${h.home}-${h.away}`.toLowerCase().replace(/\s/g, '')] = `${h.ht_home}-${h.ht_away}`);

    document.getElementById('matchLog').innerHTML = games.map(g => {
        const hName = g.home || g.team1; const aName = g.away || g.team2;
        const key = `${hName}-${aName}`.toLowerCase().replace(/\s/g, '');
        return `
            <div class="match-cols">
                <div style="text-align:left; font-size:0.9rem;">${hName} vs ${aName}</div>
                <div class="score-box">${htMap[key] || '-'} / ${g.score1}-${g.score2}</div>
                <div style="font-size:0.8rem;">${owner(hName)}</div>
                <div>8</div><div>0</div>
                <div style="font-size:0.8rem;">${owner(aName)}</div>
                <div>8</div><div>0</div>
            </div>`;
    }).join('');
}
fetchLog();
</script>
</body>
</html>
